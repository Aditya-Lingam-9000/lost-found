<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Chat - Campus Finder</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/firebaseConfig.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="js/app.js" defer></script>
  </head>
  <body data-auth="required">
    <header class="nav">
      <div class="container nav-inner">
        <a href="dashboard.html" class="brand">
          <span class="brand-icon"></span>
          <span>Back to Dashboard</span>
        </a>
      </div>
    </header>

    <main class="main-content container fade-in" style="max-width: 900px; padding-bottom: 20px;">
      <div style="margin-bottom: 20px;">
        <h2>Verification Chat</h2>
        <p style="color: var(--text-muted);">Please ask identifying questions to verify ownership before sharing contact details.</p>
      </div>
      
      <div class="chat-container slide-up">
        <div class="chat-header">
          <div>
            <h3 style="font-size: 1.1rem; margin-bottom: 4px;">Chat Session</h3>
            <span class="badge pending" id="chat-badge">Active</span>
          </div>
          <button id="resolve-btn" class="btn btn-secondary" style="width: auto; padding: 8px 16px; font-size: 0.9rem; border-color: var(--secondary); color: var(--secondary);">Mark Resolved</button>
        </div>
        
        <div class="chat-messages" id="chatList">
          <div style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-top: auto; padding: 20px;">
            Connection established. Messages are end-to-end encrypted.
          </div>
        </div>

        <form class="chat-input" id="chat-form">
          <label style="display: flex; align-items: center; justify-content: center; width: 48px; background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius-lg); cursor: pointer;" title="Attach Image">
            <input type="file" id="chat-img-input" accept="image/*" style="display: none;" />
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          </label>
          <input type="text" id="chat-input" placeholder="Type your message here..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </div>
    </main>
  </body>
</html>
